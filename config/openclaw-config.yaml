# GroundZeroOS — OpenClaw Config Template
# Copy to your project root and fill in the values below.

# Vault root: absolute path to the vault/ folder inside this starter
vault_root: /absolute/path/to/groundzeroOS-starter/vault

# LLM — uses OpenRouter (https://openrouter.ai)
# Set OPENROUTER_API_KEY environment variable
# Any model at openrouter.ai/models works — just change the model string
llm:
  model: anthropic/claude-sonnet-4-6
  # api_key: set via OPENROUTER_API_KEY env var

# Agent driver: which CLI agent executes phase tasks
# claude-code: uses `claude --print` (default, no extra install)
# cursor: uses `cursor --headless` (requires Cursor installation)
agent_driver: claude-code

# Controller limits
max_iterations: 20
stale_lock_threshold_ms: 300000  # 5 minutes

# Notifications
notify:
  stdout: true
  # whatsapp:
  #   api_url: https://your-whatsapp-api/send
  #   recipient: "+447700900000"

# Linear integration (optional)
# linear:
#   api_key: lin_api_...
#   team_id: YOUR_TEAM_ID
